name: RoccoZoom Daily Automation

on:
  schedule:
    - cron: '0 7 * * *'  # Her gün 07:00 UTC (10:00 Türkiye)
  workflow_dispatch:      # Manuel çalıştırma

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install groq
          pip install python-amazon-paapi || true

      - name: Run automation engine
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_TAG:        ${{ secrets.AMAZON_TAG }}
          ADSENSE_ID:        ${{ secrets.ADSENSE_ID }}
          PINTEREST_URL:     ${{ secrets.PINTEREST_URL }}
        run: python automation_engine.py

      - name: Commit and push updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website_data.json blog_archive.json sitemap.xml robots.txt pinterest_upload.csv
          git diff --staged --quiet || git commit -m "🤖 Daily update — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
